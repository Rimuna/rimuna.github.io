<!DOCTYPE html>

<body>
    <h1>Nanjing University of Information Science & Technology</h1>
    <h2>Student Login System</h2>

    <p>
        <a href="index.html">Home</a> |
        <a href="registration.html">Student Registration</a>
    </p>

    <h3>Login Account</h3>
    <form action="login-check.html" method="get">
        <label for="stuId">Student ID:</label><br>
        <input type="text" id="stuId" name="stuId" placeholder="Input your student ID"><br><br>

        <label for="loginPwd">Password:</label><br>
        <input type="password" id="loginPwd" name="loginPwd" placeholder="Input your password"><br><br>

        <input type="submit" value="Login">
        <input type="reset" value="Reset">
    </form>

    <p>No account yet? <a href="registration.html">Click here to register</a></p>
